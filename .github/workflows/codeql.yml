name: CodeQL

# Static analysis (SAST) for the Go library: catches injectable/unsafe patterns and dangerous
# APIs that lint alone misses. Code Scanning needs GitHub Advanced Security (free on public
# repos); skips while private.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 3 * * 1'

permissions: {}

jobs:
  analyze:
    name: Analyze go
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum
      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: go
          build-mode: autobuild
          queries: security-extended,security-and-quality
      - name: Analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: '/language:go'

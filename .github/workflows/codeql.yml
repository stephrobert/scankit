name: CodeQL

# Static analysis (SAST) for the Go library: catches injectable/unsafe patterns and dangerous
# APIs that lint alone misses. Code Scanning needs GitHub Advanced Security (free on public
# repos); skips while private.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 3 * * 1'

permissions: {}

jobs:
  analyze:
    name: Analyze go
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: go
          build-mode: autobuild
          queries: security-extended,security-and-quality
      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: '/language:go'

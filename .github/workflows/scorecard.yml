name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  branch_protection_rule:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: Scorecard Analysis
    # Scorecard needs a public repository (commit-graph API + result publication).
    # Skips while the repo is private; activates automatically once public.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-24.04
    # The read-only PAT (repo + read:org) lives in this protected environment, so Scorecard can
    # read the full branch-protection settings its Branch-Protection check needs.
    environment: security
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # Elevated read so the Branch-Protection and other checks see the full picture.
          repo_token: ${{ secrets.PLUMBER_ADMIN_TOKEN }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

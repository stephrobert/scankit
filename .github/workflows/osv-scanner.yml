name: OSV-Scanner

# Scans Go dependencies for known vulnerabilities AND malicious packages (MAL-) via the OSV
# database. PR runs only flag newly-introduced issues; scheduled/push runs catch packages
# reclassified as malicious after the fact.

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '30 12 * * 1'

permissions: {}

jobs:
  scan-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8

  scan-scheduled:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8

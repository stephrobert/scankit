name: Dependencies

# Dependency hygiene: audit every locked Go dependency (go.sum) with Trivy (pinned by SHA).
# A HIGH/CRITICAL fixable vulnerability fails the job. Re-runs weekly to catch new CVEs.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  audit:
    name: Trivy dependency audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Trivy vulnerability audit (Go lock)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'        # block on a fixable HIGH/CRITICAL
          format: table

name: Release

# Tag-triggered release for the library. scankit ships no binary — the deliverable is the
# tagged Go module. GoReleaser is the recognized publishing workflow (Scorecard Packaging): it
# builds a reproducible source archive + checksums + SBOM and signs the checksums with Cosign
# (keyless). A native SLSA build-provenance attestation is then attached as a `*.intoto.jsonl`
# release asset (Scorecard Signed-Releases). Consumers get a verifiable, SBOM-documented release.

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-24.04
    permissions:
      contents: write      # create the release + upload assets
      id-token: write      # OIDC keyless (Cosign + SLSA provenance)
      attestations: write  # native GitHub attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # GoReleaser needs full history
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          cache: false # anti cache-poisoning on a tag-triggered release (zizmor GHA-23)

      - name: Verify the module builds and tests pass
        run: |
          go build ./...
          go test ./...

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: GoReleaser (source archive, checksums, SBOM, Cosign)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Scorecard Signed-Releases looks for a `*.intoto.jsonl` asset ON the release. Attest the
      # GoReleaser artifacts and attach the provenance bundle as a release asset.
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/scankit-*.tar.gz
            dist/checksums.txt

      - name: Attach provenance asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          cp "$BUNDLE" provenance.intoto.jsonl
          gh release upload "$TAG" provenance.intoto.jsonl --clobber

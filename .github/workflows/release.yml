name: Release

# Tag-triggered release for the library. scankit ships no binary — the deliverable is the
# tagged Go module. This job builds a source archive + SBOM, produces an SLSA build-provenance
# attestation, signs the archive with Cosign (keyless), and publishes a GitHub release that
# carries the provenance as a `*.intoto.jsonl` asset (Scorecard Signed-Releases) plus the
# Cosign signature bundle. Consumers get a verifiable, SBOM-documented release to pin.

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-24.04
    permissions:
      contents: write      # create the release + attach the provenance asset
      id-token: write      # OIDC keyless (SLSA provenance + Cosign)
      attestations: write  # native GitHub attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
          cache: false # anti cache-poisoning on a tag-triggered release (zizmor GHA-23)

      - name: Verify the module builds and tests pass
        run: |
          go build ./...
          go test ./...

      - name: Build source archive + checksums
        run: |
          git archive --format=tar.gz --prefix="scankit-${GITHUB_REF_NAME}/" -o "scankit-${GITHUB_REF_NAME}.tar.gz" HEAD
          sha256sum "scankit-${GITHUB_REF_NAME}.tar.gz" > checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: scankit.spdx.json
          upload-artifact: false

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            scankit-${{ github.ref_name }}.tar.gz
            scankit.spdx.json

      # Scorecard Signed-Releases looks for a `*.intoto.jsonl` asset ON the release, not the OCI
      # attestation. Copy the attestation bundle produced above and ship it as a release asset.
      - name: Stage provenance asset
        env:
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: cp "$BUNDLE" provenance.intoto.jsonl

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the source archive (keyless)
        env:
          ARCHIVE: scankit-${{ github.ref_name }}.tar.gz
        run: |
          cosign sign-blob --yes \
            --output-signature "${ARCHIVE}.sig" \
            --output-certificate "${ARCHIVE}.pem" \
            "${ARCHIVE}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            scankit-${{ github.ref_name }}.tar.gz
            scankit-${{ github.ref_name }}.tar.gz.sig
            scankit-${{ github.ref_name }}.tar.gz.pem
            provenance.intoto.jsonl
            checksums.txt
            scankit.spdx.json

name: Dependency review

# Blocks a PR that introduces a dependency with a known HIGH/CRITICAL vulnerability or a
# disallowed license. Uses the GitHub dependency graph (free on public repos); skips while private.

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  review:
    name: Review dependency changes
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # AGPL/GPL copyleft would force-relicense the Apache-2.0 project — deny by default.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

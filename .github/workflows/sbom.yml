name: SBOM

# Generates a CycloneDX/SPDX software bill of materials with Syft on every push to main and on
# each published release (attached as a release asset). Records exactly what scankit ships.

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions: {}

jobs:
  generate:
    name: Syft SBOM
    runs-on: ubuntu-24.04
    permissions:
      contents: write    # attach SBOM to release assets
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Anchore SBOM Action (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: scankit.spdx.json
          artifact-name: scankit.spdx.json
          upload-artifact: true
          upload-release-assets: ${{ github.event_name == 'release' }}

# Dependabot keeps dependencies current — satisfies OpenSSF Scorecard's
# Dependency-Update-Tool check and surfaces vulnerable transitive bumps early.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(actions)"
    groups:
      actions:
        patterns: ["*"]

# Pre-commit hooks for scankit. Install: `pre-commit install`. Run on all files:
# `pre-commit run --all-files`. Mirrors the Go CI workflow (go.yml).
repos:
  # General hygiene + a hard stop on accidentally committing secrets/keys (public repo).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Go quality gate — mirrors go.yml and the go-production-engineer standard.
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: bash -c 'test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }'
        pass_filenames: false
        files: \.go$
      - id: go-vet
        name: go vet
        language: system
        entry: bash -c 'go vet ./...'
        pass_filenames: false
        files: \.go$
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: bash -c 'golangci-lint run ./...'
        pass_filenames: false
        files: \.go$
      - id: go-mod-tidy
        name: go mod tidy
        language: system
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        pass_filenames: false
        files: ^go\.(mod|sum)$
      - id: trufflehog
        name: TruffleHog (secret scan)
        # --no-update: never auto-fetch a new binary at hook time (supply-chain hardening).
        entry: trufflehog git file://. --since-commit HEAD --results=verified --fail --no-update
        language: system
        pass_filenames: false

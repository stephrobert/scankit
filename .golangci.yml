# golangci-lint v2 config for scankit. Standard linters + security (gosec) + correctness
# (errorlint) + hygiene (unconvert). No linter exclusions: write errors in the terminal
# renderer are handled via the errWriter pattern (report.go), not silenced. misspell is off
# on purpose — the godoc is French and it would flag valid words as typos.
version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - gosec # security: weak crypto, unsafe file APIs
    - errorlint # %w / errors.Is misuse
    - unconvert # redundant type conversions
  exclusions:
    generated: lax
    rules:
      # Tests legitimately use unchecked errors and fixtures.
      - path: _test\.go
        linters: [gosec]

formatters:
  enable:
    - gofmt
    - goimports

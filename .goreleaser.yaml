# goreleaser config for scankit. scankit is a LIBRARY: no binary is built. goreleaser is used
# as the recognized publishing workflow (Scorecard Packaging) and to produce a reproducible
# source archive, checksums, an SBOM, and a keyless Cosign signature over the checksums.
version: 2

project_name: scankit

builds:
  - skip: true # library — nothing to compile

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Tag }}"

checksum:
  name_template: "checksums.txt"

sboms:
  - id: source
    artifacts: source

# No Cosign signing here: the release workflow attaches a native SLSA provenance bundle
# (provenance.intoto.jsonl) which already satisfies Scorecard Signed-Releases. Keeping
# GoReleaser to the artifacts it owns (source archive, checksums, SBOM) avoids the
# signature-name mismatch and keeps the release deterministic.

changelog:
  disable: true

release:
  github:
    owner: stephrobert
    name: scankit
  draft: false
  prerelease: auto
